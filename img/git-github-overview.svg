<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 320" fill="none" font-family="-apple-system,BlinkMacSystemFont,'Noto Sans TC',sans-serif">
  <rect width="680" height="320" rx="16" fill="#f5f7f5"/>

  <!-- Local box -->
  <rect x="40" y="60" width="220" height="200" rx="12" fill="#ffffff" stroke="#d0d5d0" stroke-width="1.5"/>
  <text x="150" y="92" text-anchor="middle" font-size="11" font-weight="600" fill="#6b706b" letter-spacing="0.07em">本機 LOCAL</text>

  <!-- Working dir -->
  <rect x="64" y="108" width="172" height="40" rx="8" fill="#e8f3ec"/>
  <text x="150" y="133" text-anchor="middle" font-size="12" font-weight="500" fill="#1a7a45">Working Directory</text>

  <!-- Staging -->
  <rect x="64" y="160" width="172" height="40" rx="8" fill="#e8f3ec"/>
  <text x="150" y="185" text-anchor="middle" font-size="12" font-weight="500" fill="#1a7a45">Staging Area</text>

  <!-- Local repo -->
  <rect x="64" y="212" width="172" height="40" rx="8" fill="#b8d9c5"/>
  <text x="150" y="237" text-anchor="middle" font-size="12" font-weight="600" fill="#1a3a27">Local Repository</text>

  <!-- Arrows local -->
  <line x1="150" y1="148" x2="150" y2="160" stroke="#1a7a45" stroke-width="1.5" marker-end="url(#arr-g)"/>
  <text x="158" y="157" font-size="10" fill="#1a7a45" font-weight="500">git add</text>
  <line x1="150" y1="200" x2="150" y2="212" stroke="#1a7a45" stroke-width="1.5" marker-end="url(#arr-g)"/>
  <text x="158" y="210" font-size="10" fill="#1a7a45" font-weight="500">git commit</text>

  <!-- Remote box -->
  <rect x="420" y="60" width="220" height="200" rx="12" fill="#ffffff" stroke="#d0d5d0" stroke-width="1.5"/>
  <text x="530" y="92" text-anchor="middle" font-size="11" font-weight="600" fill="#6b706b" letter-spacing="0.07em">遠端 GITHUB</text>

  <rect x="444" y="108" width="172" height="80" rx="8" fill="#f0f5f0"/>
  <!-- GitHub logo placeholder -->
  <circle cx="530" cy="142" r="22" fill="#1a1c1a"/>
  <text x="530" y="147" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">GH</text>
  <text x="530" y="174" text-anchor="middle" font-size="11" font-weight="500" fill="#6b706b">Remote Repository</text>

  <rect x="444" y="200" width="172" height="40" rx="8" fill="#e8f3ec"/>
  <text x="530" y="220" text-anchor="middle" font-size="11" font-weight="500" fill="#1a7a45">GitHub Pages</text>
  <text x="530" y="234" text-anchor="middle" font-size="10" fill="#6b706b">公開網站</text>

  <!-- Push arrow -->
  <path d="M290 232 Q340 210 420 232" stroke="#1a7a45" stroke-width="2" fill="none" marker-end="url(#arr-g)" stroke-dasharray="0"/>
  <text x="340" y="208" text-anchor="middle" font-size="11" font-weight="600" fill="#1a7a45">git push</text>

  <!-- Pull arrow -->
  <path d="M420 248 Q340 270 290 248" stroke="#6b706b" stroke-width="2" fill="none" marker-end="url(#arr-gray)" stroke-dasharray="5,3"/>
  <text x="340" y="272" text-anchor="middle" font-size="11" font-weight="500" fill="#6b706b">git pull / clone</text>

  <!-- VS Code label -->
  <rect x="40" y="280" width="100" height="24" rx="6" fill="#1a1c1a"/>
  <text x="90" y="296" text-anchor="middle" font-size="10" font-weight="600" fill="#ffffff">VS Code</text>

  <!-- Arrow defs -->
  <defs>
    <marker id="arr-g" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#1a7a45"/>
    </marker>
    <marker id="arr-gray" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#6b706b"/>
    </marker>
  </defs>
</svg>
